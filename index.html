<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Sol Home Apps</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="login-screen" class="screen">
    <div class="login-card">
      <img src="assets/logo.png" alt="DM Sol Home" class="login-logo">
      <h1>DM Sol Home Apps</h1>
      <p class="login-subtitle">Aplicación de Gestión - DM Sol Home</p>
      <button id="btn-google-login" class="btn btn-primary">Iniciar sesión con Google</button>
    </div>
  </div>

  <div id="denied-screen" class="screen hidden">
    <div class="login-card">
      <h1>Acceso no autorizado</h1>
      <p>La cuenta <strong id="denied-email"></strong> no está habilitada para usar este sistema. Pedile a quien administra la app que te agregue.</p>
      <button id="btn-logout-denied" class="btn btn-secondary">Cerrar sesión</button>
    </div>
  </div>

  <div id="app-screen" class="hidden">
    <header class="topbar">
      <div class="topbar-brand">
        <img src="assets/logo.png" alt="DM Sol Home" class="topbar-logo">
        Aplicación de Gestión - DM Sol Home
      </div>
      <div class="topbar-user">
        <span id="user-name" class="user-pill"></span>
        <button id="btn-logout" class="btn btn-secondary btn-sm">Salir</button>
      </div>
    </header>
    <div class="layout">
      <nav class="sidebar">
        <button class="nav-item active" data-section="proveedores">Proveedores</button>
        <button class="nav-item" data-section="inventario">Inventario</button>
        <button class="nav-item" data-section="stock">Stock</button>
        <button class="nav-item" data-section="ordenes">Órdenes de compra</button>
        <button class="nav-item" data-section="recepciones">Recepciones</button>
        <button class="nav-item" data-section="configuracion">Configuración</button>
      </nav>
      <main class="content">
        <section id="section-proveedores" class="section"></section>
        <section id="section-inventario" class="section hidden"><p class="proximamente">Próximamente.</p></section>
        <section id="section-stock" class="section hidden"><p class="proximamente">Próximamente.</p></section>
        <section id="section-ordenes" class="section hidden"><p class="proximamente">Próximamente.</p></section>
        <section id="section-recepciones" class="section hidden"><p class="proximamente">Próximamente.</p></section>
        <section id="section-configuracion" class="section hidden"><p class="proximamente">Próximamente.</p></section>
      </main>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
